<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Formato de Atención a Usuarios - Proceso Informático</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        background: #f6f8fb url("https://lh3.googleusercontent.com/d/1Gf0MdTkqZzOAXNcX6NVH8Onj9Y_COpWc") no-repeat left center fixed;
        background-size: cover;
        position: relative;
        min-height: 100vh;
        font-family: "Manrope", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #1e2a44;
      }


      .page-content {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        justify-content: flex-end;
        align-items: flex-start;
        padding: 2rem 2.75rem 3rem;
      }

      .form-wrapper {
        width: min(72vw, 1200px);
        margin-left: auto;
      }

      @media (max-width: 991.98px) {
        .page-content {
          padding: 1.5rem 1.25rem 2rem;
          justify-content: center;
        }

        .form-wrapper {
          width: min(100%, 980px);
        }
      }

      .card {
        border: 0;
        box-shadow: 0 22px 50px rgba(15, 23, 42, 0.18);
        background: rgba(255, 255, 255, 0.97);
        border-radius: 26px;
        padding: 2.25rem 2.5rem;
        animation: riseIn 600ms ease-out;
      }

      .brand-logo {
        width: clamp(240px, 28vw, 420px);
        height: auto;
      }

      .brand-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid #e6ecf5;
      }

      .brand-header h1 {
        font-weight: 700;
        font-size: 1.2rem;
        letter-spacing: 0.01em;
      }

      .brand-header p {
        font-size: 0.9rem;
        color: #5f6f8d;
      }

      @keyframes riseIn {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }


      .section-title {
        font-weight: 600;
        color: #24314f;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .section-title::before {
        content: "";
        width: 36px;
        height: 3px;
        border-radius: 999px;
        background: linear-gradient(90deg, #1f4ea7, #2f7edb);
      }

      .section-block {
        border: 1px solid #e1e8f3;
        border-radius: 18px;
        padding: 1.25rem;
        background: linear-gradient(180deg, #fbfdff, #f5f8ff);
      }

      .form-label {
        font-weight: 600;
        color: #33415f;
        font-size: 0.85rem;
        letter-spacing: 0.02em;
      }

      .form-control,
      .form-select {
        border-radius: 12px;
        border: 1px solid #dbe4f2;
        background: #fdfdff;
      }

      .form-control:focus,
      .form-select:focus {
        border-color: #4785e5;
        box-shadow: 0 0 0 0.2rem rgba(71, 133, 229, 0.15);
      }

      .status-text {
        min-height: 24px;
      }

      .footer-note {
        margin-top: 1.5rem;
        font-size: 0.85rem;
        color: #6b7a96;
        text-align: center;
      }

      .hidden-signature {
        position: absolute;
        left: -9999px;
        width: 1px;
        height: 1px;
        overflow: hidden;
      }
    </style>
  </head>

    <div class="page-content">
      <div class="form-wrapper">
        <div class="card">

              <div>
                <h1 class="h4 mb-1">Formato de Atención a Usuarios - Proceso Informático</h1>
              </div>
            </div>

            <form id="formularioAtencion" class="row g-3">
              <div class="col-md-4">
                <label for="idSolicitud" class="form-label">ID Solicitud</label>
                <input
                  type="text"
                  class="form-control"
                  id="idSolicitud"
                  name="idSolicitud"
                  placeholder="Se asigna al enviar"
                  readonly
                  required
                />
              </div>
              <div class="col-md-4">
                <label for="fechaAtencion" class="form-label">Fecha Atención</label>
                <input
                  type="date"
                  class="form-control"
                  id="fechaAtencion"
                  name="fechaAtencion"
                  required
                />
              </div>
              <div class="col-md-4">
                <label for="equipo" class="form-label">Equipo Nombre/Código</label>
                <input
                  type="text"
                  class="form-control"
                  id="equipo"
                  name="equipo"
                  placeholder="PC-SOPORTE05"
                  maxlength="60"
                />
              </div>

              <div class="col-md-6">
                <label for="servidorPublico" class="form-label">Profesional / Usuario</label>
                <input
                  type="text"
                  class="form-control"
                  id="servidorPublico"
                  name="servidorPublico"
                  maxlength="80"
                  required
                />
              </div>
              <div class="col-md-6">
                <label for="areaEntidad" class="form-label">Área o Entidad</label>
                <input
                  type="text"
                  class="form-control"
                  id="areaEntidad"
                  name="areaEntidad"
                  maxlength="80"
                  required
                />
              </div>

              <div class="col-md-6">
                <label for="servidorCedula" class="form-label">Cédula del Profesional / Usuario</label>
                <input
                  type="text"
                  class="form-control"
                  id="servidorCedula"
                  name="servidorCedula"
                  maxlength="15"
                  inputmode="numeric"
                  pattern="\d{5,15}"
                  required
                />
              </div>
              <div class="col-md-6">
                <label for="servidorCargo" class="form-label">Cargo del Profesional / Usuario</label>
                <input
                  type="text"

                  maxlength="80"

              </div>

              <div class="col-md-6">

                <input
                  type="text"

                  id="tecnicoNombre"
                  name="tecnicoNombre"
                  maxlength="80"
                  required

              </div>
              <div class="col-md-6">
                <label for="tecnicoCedula" class="form-label">Cédula del Técnico</label>
                <input
                  type="text"

                        <label class="form-check-label" for="sis-32">Mantenimientos aplicativos</label>
                      </div>
                      <div class="form-check">
                        <input
                          class="form-check-input"
                          type="checkbox"
                          id="sis-33"
                          name="clasificacion"
                          value="C33"
                          data-label="Sistemas - Mantenimientos bases de datos"
                        />
                        <label class="form-check-label" for="sis-33">Mantenimientos bases de datos</label>
                      </div>
                      <div class="form-check">
                        <input
                          class="form-check-input"
                          type="checkbox"
                          id="sis-34"
                          name="clasificacion"
                          value="C34"
                          data-label="Sistemas - Migraciones páginas web"
                        />
                        <label class="form-check-label" for="sis-34">Migraciones páginas web</label>
                      </div>
                      <div class="form-check">
                        <input
                          class="form-check-input"
                          type="checkbox"
                          id="sis-35"
                          name="clasificacion"
                          value="C35"
                          data-label="Sistemas - Publicación (Intranet, Meci - Calidad o Página web)"
                        />
                        <label class="form-check-label" for="sis-35">
                          Publicación (Intranet, Meci - Calidad o Página web)
                        </label>
                      </div>
                      <div class="form-check">
                        <input
                          class="form-check-input"
                          type="checkbox"
                          id="sis-36"
                          name="clasificacion"
                          value="C36"
                          data-label="Sistemas - Soporte aplicativos"
                        />
                        <label class="form-check-label" for="sis-36">Soporte aplicativos</label>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="col-12">
                <label for="diagnostico" class="form-label">Diagnóstico y Justificación</label>
                <textarea
                  class="form-control"
                  id="diagnostico"
                  name="diagnostico"
                  rows="2"
                  maxlength="500"
                ></textarea>
              </div>

              <div class="col-md-6">
                <label for="soporteExterno" class="form-label">¿Requiere Soporte Externo?</label>
                <select class="form-select" id="soporteExterno" name="soporteExterno">
                  <option value="No" selected>No</option>
                  <option value="Sí">Sí</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="resolvioNecesidad" class="form-label">¿Resolvió Necesidad?</label>
                <select class="form-select" id="resolvioNecesidad" name="resolvioNecesidad">
                  <option value="Sí" selected>Sí</option>
                  <option value="No">No</option>
                </select>
              </div>

              <div class="col-md-6">
                <label for="estadoCaso" class="form-label">Estado del caso</label>
                <select class="form-select" id="estadoCaso" name="estadoCaso" required>
                  <option value="Abierto" selected>Abierto</option>
                  <option value="En proceso">En proceso</option>
                  <option value="Cerrado">Cerrado</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="fechaCierre" class="form-label">Fecha de cierre</label>
                <input
                  type="date"
                  class="form-control"
                  id="fechaCierre"
                  name="fechaCierre"
                  disabled
                />
              </div>

              <div class="col-12">
                <label for="soporteExternoObservaciones" class="form-label">
                  Observaciones de soporte externo
                </label>
                <textarea
                  class="form-control"
                  id="soporteExternoObservaciones"
                  name="soporteExternoObservaciones"
                  rows="2"
                  maxlength="500"
                ></textarea>
              </div>

              <div class="col-12">
                <label for="expectativas" class="form-label">Expectativas del servicio</label>
                <textarea
                  class="form-control"
                  id="expectativas"
                  name="expectativas"
                  rows="2"
                  maxlength="300"
                ></textarea>
              </div>

              <div class="col-12">
                <div class="section-title mb-2">Evidencia fotografica</div>
                <div class="section-block">
                  <div class="row g-3">
                    <div class="col-12">
                      <label for="fotosEvidencia" class="form-label">
                        Fotos del mantenimiento (puede seleccionar varias)
                      </label>
                      <input
                        type="file"
                        class="form-control"
                        id="fotosEvidencia"
                        name="fotosEvidencia"
                        accept="image/*"
                        multiple
                      />
                      <div class="form-text" id="fotoIndicador">0 fotos · 0 MB</div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="col-12 d-flex flex-wrap gap-3 align-items-center">
                <button type="submit" class="btn btn-primary" id="btnEnviar">
                  Enviar
                </button>
                <span id="estado" class="text-muted status-text"></span>
              </div>
            </form>
            <div class="footer-note">&copy; 2026 Fundaci&#243;n Conexi&#243;n Salud. Todos los derechos reservados.</div>
            <span class="hidden-signature" aria-hidden="true">EUARCHIN</span>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("formularioAtencion");
      const btnEnviar = document.getElementById("btnEnviar");
      const estado = document.getElementById("estado");
      const idSolicitud = document.getElementById("idSolicitud");
      const fechaAtencion = document.getElementById("fechaAtencion");
      const fotosEvidencia = document.getElementById("fotosEvidencia");
      const soporteExterno = document.getElementById("soporteExterno");
      const soporteExternoObservaciones = document.getElementById(
        "soporteExternoObservaciones"
      );
      const estadoCaso = document.getElementById("estadoCaso");
      const fechaCierre = document.getElementById("fechaCierre");
      const fotoIndicador = document.getElementById("fotoIndicador");

      const MAX_FOTOS = 5;
      const MAX_FOTO_BYTES = 3 * 1024 * 1024;
      const TIPOS_FOTO_VALIDOS = ["image/jpeg", "image/png", "image/webp"];

      const setDefaultDate = () => {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, "0");
        const dd = String(today.getDate()).padStart(2, "0");
        fechaAtencion.value = `${yyyy}-${mm}-${dd}`;
      };

      const syncEstadoCaso = () => {
        const cerrado = estadoCaso?.value === "Cerrado";
        if (fechaCierre) {
          fechaCierre.disabled = !cerrado;
          fechaCierre.required = cerrado;
          if (cerrado && !fechaCierre.value) {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, "0");
            const dd = String(today.getDate()).padStart(2, "0");
            fechaCierre.value = `${yyyy}-${mm}-${dd}`;
          }
          if (!cerrado) {
            fechaCierre.value = "";
          }
        }
      };

      const actualizarIndicadorFotos = () => {
        if (!fotoIndicador) {
          return;
        }
        const archivos = Array.from(fotosEvidencia?.files || []);
        const totalBytes = archivos.reduce((sum, file) => sum + file.size, 0);
        const totalMb = totalBytes / (1024 * 1024);
        const totalTexto = totalBytes ? totalMb.toFixed(2) : "0";
        fotoIndicador.textContent = `${archivos.length} fotos · ${totalTexto} MB`;
      };

      const mostrarError = (mensaje) => {
        estado.textContent = mensaje;
        btnEnviar.disabled = false;
        btnEnviar.textContent = "Enviar";
      };


      const leerArchivosComoBase64 = (files) => {
        const list = Array.from(files || []);
        if (!list.length) {
          return Promise.resolve([]);
        }

        return Promise.all(
          list.map(
            (file) =>
              new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                  const result = String(reader.result || "");
                  const base64 = result.split(",")[1] || "";
                  resolve({
                    name: file.name,
                    mimeType: file.type || "image/jpeg",
                    data: base64,
                  });
                };
                reader.onerror = () => reject(new Error("No se pudo leer la foto."));
                reader.readAsDataURL(file);
              })
          )
        );
      };

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        btnEnviar.disabled = true;
        btnEnviar.textContent = "Procesando...";
        estado.textContent = "Preparando evidencia";

        const rawData = new FormData(form);
        const formData = {};
        rawData.forEach((value, key) => {
          formData[key] = value;
        });

        const seleccion = Array.from(
          form.querySelectorAll('input[name="clasificacion"]:checked')
        );
        const clasificacionCeldas = seleccion.map((input) => input.value);
        const clasificacionTexto = seleccion.map(
          (input) => input.dataset.label || input.value
        );

        formData.clasificacionCeldas = clasificacionCeldas.join(",");
        formData.clasificacionTexto = clasificacionTexto.join(" | ");

        if (soporteExterno?.value === "Sí") {
          const observaciones = soporteExternoObservaciones?.value?.trim();
          if (!observaciones) {
            mostrarError("Indique observaciones de soporte externo.");
            return;
          }
        }

        if (estadoCaso?.value === "Cerrado" && !fechaCierre?.value) {
          mostrarError("Indique la fecha de cierre.");
          return;
        }

        const fotosList = Array.from(fotosEvidencia?.files || []);
        if (fotosList.length > MAX_FOTOS) {
          mostrarError(`Maximo ${MAX_FOTOS} fotos permitidas.`);
          return;
        }
        if (fotosList.some((file) => !TIPOS_FOTO_VALIDOS.includes(file.type))) {
          mostrarError("Solo se permiten fotos JPG, PNG o WEBP.");
          return;
        }
        if (fotosList.some((file) => file.size > MAX_FOTO_BYTES)) {
          mostrarError("Hay fotos que superan 3 MB.");
          return;
        }

        leerArchivosComoBase64(fotosEvidencia?.files)
          .then((fotos) => {
            formData.fotosEvidencia = fotos;
            estado.textContent = "Enviando solicitud";
            google.script.run
              .withSuccessHandler((nuevoId) => {
                estado.textContent = nuevoId
                  ? `Solicitud enviada correctamente. ID: ${nuevoId}`
                  : "Solicitud enviada correctamente";
                btnEnviar.disabled = false;
                btnEnviar.textContent = "Enviar";
                form.reset();
                setDefaultDate();
                syncEstadoCaso();
                actualizarIndicadorFotos();
                idSolicitud.value = "";
              })
              .withFailureHandler((error) => {
                estado.textContent = `Error: ${error.message || error}`;
                btnEnviar.disabled = false;
                btnEnviar.textContent = "Enviar";
              })
              .procesarFormularioWeb(formData);
          })
          .catch((error) => {
            mostrarError(error.message || "Error al leer las fotos.");
          });
      });

      setDefaultDate();
      syncEstadoCaso();
      actualizarIndicadorFotos();

      estadoCaso?.addEventListener("change", syncEstadoCaso);
      fotosEvidencia?.addEventListener("change", actualizarIndicadorFotos);
    </script>
  </body>
</html>
